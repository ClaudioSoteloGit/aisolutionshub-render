# Render.com Build & Start Commands
# Free tier: 750hrs/mes, duerme tras 15min inactividad

buildCommand: npm install
startCommand: node server.js

# Environment
envVars:
  - key: NODE_VERSION
    value: 18
  - key: PORT
    value: 3000
  - key: CHROME_PATH
    value: /usr/bin/google-chrome-stable

# Instance type (free)
plan: free

# Auto-deploy from main branch
autoDeploy: true
